name: release_github

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom tag to release as'
        required: false
        type: string
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  BUILD_PYTHON_VERSION: "3.10"
  BUILD_POETRY_VERSION: "2.2.1"

jobs:
  build_python:
    runs-on: ubuntu-latest
    env:
      POETRY_VIRTUALENVS_CREATE: false
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v3

      - name: Set up Python ${{ env.BUILD_PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.BUILD_PYTHON_VERSION }}

      - name: Set up Poetry ${{ env.BUILD_POETRY_VERSION }}
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ env.BUILD_POETRY_VERSION }}
          poetry-plugins: "poetry-plugin-export"

      - name: Export requirements
        run: just build-requirements

      - name: Build project for distribution
        run: just build

      - name: Save release python requirements
        uses: actions/upload-artifact@v4
        with:
          name: release_dist_reqs
          path: build/requirements.txt

      - name: Save release python packages
        uses: actions/upload-artifact@v4
        with:
          name: release_dist_python
          path: dist

  build_mac:
    needs: build_python
    strategy:
      matrix:
        include:
          # - arch: x64
          #   runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v3

      - name: Load release python requirements
        uses: actions/download-artifact@v4
        with:
          name: release_dist_reqs
          path: build

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.BUILD_PYTHON_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install requirements
        run: |
          brew install gnu-sed graphicsmagick imagemagick
          npm install --global create-dmg

      - name: Build
        run: |
          just build-macos-package
          just clean-pyinstaller-dist

      - name: Save release binaries for macos ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: release_dist_bin_macos_${{ matrix.arch }}
          path: dist

  build_win:
    needs: build_python
    if: false # Temporarily disable windows build
    strategy:
      matrix:
        arch: [x86, x64]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v3

      - name: Load release python requirements
        uses: actions/download-artifact@v4
        with:
          name: release_dist_reqs
          path: build

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.BUILD_PYTHON_VERSION }}
          architecture: ${{ matrix.arch }}

      - name: Install requirements
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install wget zip

      - name: Build
        env:
          BUILD_ARCH: ${{ matrix.arch == 'x86' && 'win32' || 'win64' }}
        run: |
          just build-win-package
          just clean-pyinstaller-dist

      - name: Save release binaries for windows ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: release_dist_bin_windows_${{ matrix.arch }}
          path: dist

  build_appimage:
    needs: build_python
    if: false # Temporarily disable AppImage build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v3

      - name: Load release python packages
        uses: actions/download-artifact@v4
        with:
          name: release_dist_python
          path: dist

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.BUILD_PYTHON_VERSION }}

      - name: Install requirements
        run: |
          sudo apt-get install -y desktop-file-utils appstream-util

      - name: Build
        run: |
          just build-linux-appimage

      - name: Save release binaries for linux x64
        uses: actions/upload-artifact@v4
        with:
          name: release_dist_bin_linux_x64
          path: dist

  release:
    if: github.event_name == 'push' || github.event.inputs.tag != ''
    # needs: [build_win, build_mac, build_appimage]
    needs: [build_mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v1

      - name: Load release python packages
        uses: actions/download-artifact@v4
        with:
          name: release_dist_python
          path: dist

      - name: Load release binaries for linux x64
        uses: actions/download-artifact@v4
        with:
          name: release_dist_bin_linux_x64
          path: dist

      - name: Load release binaries for windows x86
        uses: actions/download-artifact@v4
        with:
          name: release_dist_bin_windows_x86
          path: dist

      - name: Load release binaries for windows x64
        uses: actions/download-artifact@v4
        with:
          name: release_dist_bin_windows_x64
          path: dist

      - name: Load release binaries for macos x64
        uses: actions/download-artifact@v4
        with:
          name: release_dist_bin_macos_x64
          path: dist

      - name: Load release binaries for macos arm64
        uses: actions/download-artifact@v4
        with:
          name: release_dist_bin_macos_arm64
          path: dist

      - name: Create Release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          body: ${{ steps.extract-release-notes.outputs.release_notes }}
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true

      - name: Create Release (Custom Tag)
        if: github.event_name != 'push' && github.event.inputs.tag != ''
        uses: ncipollo/release-action@v1
        with:
          body: ${{ steps.extract-release-notes.outputs.release_notes }}
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          tag: ${{ github.event.inputs.tag }}
